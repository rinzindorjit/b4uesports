<!DOCTYPE html>
<html>
<head>
    <title>Profile Image Upload Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
        }
        .upload-container {
            border: 2px dashed #ccc;
            border-radius: 10px;
            padding: 30px;
            text-align: center;
            margin: 20px 0;
        }
        .preview-image {
            max-width: 200px;
            max-height: 200px;
            margin: 20px auto;
            display: block;
            border-radius: 50%;
        }
        button {
            background: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            margin: 10px;
        }
        button:hover {
            background: #0056b3;
        }
        input[type="file"] {
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <h1>Profile Image Upload Test</h1>
    
    <div class="upload-container">
        <h2>Upload Profile Image</h2>
        <input type="file" id="imageInput" accept="image/*">
        <div>
            <button onclick="uploadImage()">Upload Image</button>
            <button onclick="clearImage()">Clear</button>
        </div>
    </div>
    
    <div id="previewContainer">
        <h2>Preview</h2>
        <img id="previewImage" class="preview-image" src="" alt="Preview" style="display: none;">
        <p id="statusMessage">No image selected</p>
    </div>

    <script>
        let selectedFile = null;
        
        document.getElementById('imageInput').addEventListener('change', function(event) {
            selectedFile = event.target.files[0];
            if (selectedFile) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('previewImage').src = e.target.result;
                    document.getElementById('previewImage').style.display = 'block';
                    document.getElementById('statusMessage').textContent = 'Image selected. Click "Upload Image" to test.';
                };
                reader.readAsDataURL(selectedFile);
            }
        });
        
        async function uploadImage() {
            if (!selectedFile) {
                alert('Please select an image first');
                return;
            }
            
            // Create FormData
            const formData = new FormData();
            formData.append('profileImage', selectedFile);
            
            // Add some mock profile data
            formData.append('email', JSON.stringify('test@example.com'));
            formData.append('phone', JSON.stringify('+1234567890'));
            
            try {
                // Simulate the upload process
                document.getElementById('statusMessage').textContent = 'Uploading...';
                
                // In a real app, you would send this to your server:
                // const response = await fetch('/api/profile', {
                //     method: 'PUT',
                //     body: formData,
                //     headers: {
                //         'Authorization': 'Bearer your-token-here'
                //     }
                // });
                
                // Simulate a successful response
                setTimeout(() => {
                    document.getElementById('statusMessage').textContent = 'Upload successful! In a real application, this would be saved to your profile.';
                }, 1000);
                
            } catch (error) {
                document.getElementById('statusMessage').textContent = 'Upload failed: ' + error.message;
            }
        }
        
        function clearImage() {
            document.getElementById('imageInput').value = '';
            document.getElementById('previewImage').style.display = 'none';
            document.getElementById('previewImage').src = '';
            document.getElementById('statusMessage').textContent = 'No image selected';
            selectedFile = null;
        }
    </script>
</body>
</html>
