<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <meta name="referrer" content="no-referrer" />
    <title>B4U Esports - Pi Network Testnet</title>
    <meta name="description" content="Testnet version of B4U Esports for Pi Network development">
    
    <!-- Security headers for Pi Browser compatibility -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval' https://*.pi-network.io https://*.minepi.com https://cdnjs.cloudflare.com https://api.coingecko.com; connect-src 'self' https://*.pi-network.io https://*.minepi.com https://api.coingecko.com; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://*.pi-network.io https://*.minepi.com https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; img-src 'self' data: https:; font-src 'self' data: https://cdnjs.cloudflare.com;">
    
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    
    <!-- Pi SDK - Always load for testnet development -->
    <script>
      // Always load Pi SDK for testnet/sandbox environments
      const script = document.createElement('script');
      script.src = 'https://sandbox.minepi.com/pi-sdk.js';
      script.onload = function() {
        console.log('Pi SDK loaded successfully');
        // Initialize with sandbox mode for testnet development
        if (window.Pi) {
          try {
            window.Pi.init({ version: "2.0", sandbox: true });
            console.log('Pi SDK initialized in sandbox mode');
          } catch (error) {
            console.warn('Failed to initialize Pi SDK:', error);
          }
        }
      };
      script.onerror = function() {
        console.warn('Failed to load Pi SDK - using mock mode');
      };
      document.head.appendChild(script);
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
