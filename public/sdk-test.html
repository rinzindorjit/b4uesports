<!DOCTYPE html>
<html>
<head>
    <title>Pi SDK Test</title>
    <script src="https://sandbox.minepi.com/pi-sdk.js"></script>
    <script>
        window.onload = function() {
            if (window.Pi) {
                try {
                    window.Pi.init({ version: "2.0", sandbox: true });
                    document.getElementById('result').innerHTML = '✅ Pi SDK loaded and initialized successfully in sandbox mode';
                } catch (error) {
                    document.getElementById('result').innerHTML = '❌ Pi SDK loaded but initialization failed: ' + error.message;
                }
            } else {
                document.getElementById('result').innerHTML = '❌ Pi SDK not available';
            }
        };
    </script>
</head>
<body>
    <h1>Pi SDK Test</h1>
    <p id="result">Testing...</p>
</body>
</html>
