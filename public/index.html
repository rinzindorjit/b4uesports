<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>B4U Esports - Pi Network Testnet</title>
    <meta name="description" content="Testnet version of B4U Esports for Pi Network development">
    
    <!-- Pi SDK - Always load for testnet development -->
    <script>
      // Always load Pi SDK for testnet/sandbox environments
      const script = document.createElement('script');
      script.src = 'https://sandbox.minepi.com/pi-sdk.js';
      script.onload = function() {
        console.log('Pi SDK loaded successfully');
        // Initialize with sandbox mode for testnet development
        if (window.Pi) {
          try {
            window.Pi.init({ version: "2.0", sandbox: true });
            console.log('Pi SDK initialized in sandbox mode');
          } catch (error) {
            console.warn('Failed to initialize Pi SDK:', error);
          }
        }
      };
      script.onerror = function() {
        console.warn('Failed to load Pi SDK - using mock mode');
      };
      document.head.appendChild(script);
    </script>
    
    <!-- Simple CSS for the minimal page -->
    <style>
      body {
        margin: 0;
        padding: 0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
      }
      
      #root {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background-color: #0d1117;
        color: #fff;
      }
      
      .container {
        text-align: center;
        max-width: 600px;
        padding: 20px;
      }
      
      h1 {
        font-size: 2.5rem;
        margin-bottom: 1rem;
        background: linear-gradient(90deg, #4F46E5, #7C3AED);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      
      p {
        font-size: 1.2rem;
        color: #94a3b8;
        margin-bottom: 2rem;
      }
      
      .pay-button {
        padding: 12px 24px;
        font-size: 1rem;
        font-weight: 600;
        border-radius: 8px;
        border: none;
        cursor: pointer;
        background: linear-gradient(90deg, #f59e0b, #f97316);
        color: white;
        transition: transform 0.2s, box-shadow 0.2s;
      }
      
      .pay-button:hover {
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(245, 158, 11, 0.3);
      }
      
      .pay-button:active {
        transform: translateY(0);
      }
      
      .testnet-badge {
        display: inline-block;
        background-color: #f59e0b;
        color: #000;
        padding: 4px 8px;
        border-radius: 4px;
        font-size: 0.8rem;
        font-weight: bold;
        margin-top: 1rem;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="container">
        <h1>B4U Esports</h1>
        <p>Welcome to the official Pi Testnet integration for gaming currency purchases</p>
        <button class="pay-button" onclick="handlePayWithPi()">
          Pay with Pi
        </button>
        <div class="testnet-badge">TESTNET MODE</div>
      </div>
    </div>
    
    <script>
      function handlePayWithPi() {
        // Check if Pi SDK is available
        if (typeof window.Pi !== 'undefined') {
          alert('Pi SDK is available! In a full implementation, this would initiate a payment.');
          // In a real implementation, you would call Pi SDK functions here
          // For example: Pi.createPayment(...)
        } else {
          alert('Pi SDK not available. This is a mock implementation for testing.');
        }
      }
      
      // If React app loads successfully, it will replace this content
      // If it fails, this minimal page will remain
      console.log('Minimal page loaded - waiting for React app');
    </script>
    
    <!-- Load the React app -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
