<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>B4U Esports - Pi Network Testnet</title>
    <meta name="description" content="Testnet version of B4U Esports for Pi Network development">
    
    <!-- Pi SDK - Always load for testnet development -->
    <script>
      // Always load Pi SDK for testnet/sandbox environments
      const script = document.createElement('script');
      script.src = 'https://sandbox.minepi.com/pi-sdk.js';
      script.onload = function() {
        console.log('Pi SDK loaded successfully');
        // Initialize with sandbox mode for testnet development
        if (window.Pi) {
          try {
            window.Pi.init({ version: "2.0", sandbox: true });
            console.log('Pi SDK initialized in sandbox mode');
          } catch (error) {
            console.warn('Failed to initialize Pi SDK:', error);
          }
        }
      };
      script.onerror = function() {
        console.warn('Failed to load Pi SDK - using mock mode');
      };
      document.head.appendChild(script);
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
