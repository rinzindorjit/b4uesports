<!DOCTYPE html>
<html>
<head>
    <title>Pi Network API Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test-section { margin: 20px 0; padding: 15px; border: 1px solid #ddd; }
        .result { margin: 10px 0; padding: 10px; background: #f5f5f5; }
        .success { background: #d4edda; border-color: #c3e6cb; }
        .error { background: #f8d7da; border-color: #f5c6cb; }
        button { padding: 10px 15px; margin: 5px; cursor: pointer; }
        pre { background: #f8f9fa; padding: 10px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>Pi Network API Test</h1>
    
    <div class="test-section">
        <h2>Test Payment Creation</h2>
        <button onclick="testCreatePayment()">Create Payment</button>
        <button onclick="testComprehensive()">Run Comprehensive Test</button>
        <button onclick="testEndpoints()">Test Different Endpoints</button>
        <div id="test-results"></div>
    </div>

    <script>
        const API_BASE = '/api';
        
        async function testCreatePayment() {
            const resultDiv = document.getElementById('test-results');
            resultDiv.innerHTML = '<div class="result">Testing payment creation...</div>';
            
            try {
                const response = await fetch(`${API_BASE}/pi/create-payment`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        amount: 1.0,
                        packageId: 'test-package',
                        gameAccount: { ign: 'TestPlayer', uid: 'TEST123' },
                        userUid: 'test-user-123'
                    })
                });
                
                const data = await response.json();
                const resultClass = response.ok ? 'success' : 'error';
                
                resultDiv.innerHTML = `
                    <div class="result ${resultClass}">
                        <h3>Payment Creation Result</h3>
                        <p>Status: ${response.status} ${response.statusText}</p>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    </div>
                `;
            } catch (error) {
                resultDiv.innerHTML = `
                    <div class="result error">
                        <h3>Payment Creation Error</h3>
                        <p>${error.message}</p>
                    </div>
                `;
            }
        }
        
        async function testComprehensive() {
            const resultDiv = document.getElementById('test-results');
            resultDiv.innerHTML = '<div class="result">Running comprehensive test...</div>';
            
            try {
                const response = await fetch(`${API_BASE}/comprehensive-pi-test`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({})
                });
                
                const data = await response.json();
                const resultClass = response.ok ? 'success' : 'error';
                
                resultDiv.innerHTML = `
                    <div class="result ${resultClass}">
                        <h3>Comprehensive Test Result</h3>
                        <p>Status: ${response.status} ${response.statusText}</p>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    </div>
                `;
            } catch (error) {
                resultDiv.innerHTML = `
                    <div class="result error">
                        <h3>Comprehensive Test Error</h3>
                        <p>${error.message}</p>
                    </div>
                `;
            }
        }
        
        async function testEndpoints() {
            const resultDiv = document.getElementById('test-results');
            resultDiv.innerHTML = '<div class="result">Testing different endpoints...</div>';
            
            try {
                const response = await fetch(`${API_BASE}/test-pi-endpoints`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({})
                });
                
                const data = await response.json();
                const resultClass = response.ok ? 'success' : 'error';
                
                resultDiv.innerHTML = `
                    <div class="result ${resultClass}">
                        <h3>Endpoint Test Result</h3>
                        <p>Status: ${response.status} ${response.statusText}</p>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    </div>
                `;
            } catch (error) {
                resultDiv.innerHTML = `
                    <div class="result error">
                        <h3>Endpoint Test Error</h3>
                        <p>${error.message}</p>
                    </div>
                `;
            }
        }
    </script>
</body>
</html>
